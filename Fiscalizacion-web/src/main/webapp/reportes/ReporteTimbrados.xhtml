<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
   <h:head>
     
        <link href="#{facesContext.externalContext.context.contextPath}/css/default.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/tableLayout.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/cssLayout.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/font-awesome.min.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/fonts.googleapis.com.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/ace.min.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/ace-rtl.min.css" rel="stylesheet" type="text/css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
     
    </h:head>
<script type="text/javascript">
    //<![CDATA[
    function start() {
        window['progress'] = setInterval(function() {
    var pbClient = PF('pbClient'),
    oldValue = pbClient.getValue(),
    newValue = oldValue + 10;

    pbClient.setValue(pbClient.getValue() + 10);

    if(newValue === 100) {
        clearInterval(window['progress']);
    }
        }, 1000);
    }

    function cancel() {
        clearInterval(window['progress']);
        PF('pbClient').setValue(0);
        PF('startButton1').enable();
    }
    //]]>
    </script>
 
   <p:panel style="font-size: larger;font-weight: bold; color: #004085" class="form-group col-lg-12 col-md-12 col-sm-12 col-xs-12">
        
        <h:form id="frmTimbrados">
            <p:growl id="msgs" showDetail="true"  />
            <div class="form-group col-md-12">
                <p:outputLabel value="Código empleado: " class=" col-lg-1 col-md-1 control-label"/>    
               
                <p:inputNumber id="valor0" value="#{reporteTimbradosControlador.codigo}" title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor1" value="#{reporteTimbradosControlador.codigo1}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor2" value="#{reporteTimbradosControlador.codigo2}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor3" value="#{reporteTimbradosControlador.codigo3}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor4" value="#{reporteTimbradosControlador.codigo4}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor5" value="#{reporteTimbradosControlador.codigo5}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor6" value="#{reporteTimbradosControlador.codigo6}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor7" value="#{reporteTimbradosControlador.codigo7}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor8" value="#{reporteTimbradosControlador.codigo8}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor9" value="#{reporteTimbradosControlador.codigo9}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor10" value="#{reporteTimbradosControlador.codigo10}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor11" value="#{reporteTimbradosControlador.codigo11}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor12" value="#{reporteTimbradosControlador.codigo12}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
                <p:inputNumber id="valor13" value="#{reporteTimbradosControlador.codigo13}"  title="codigo" placeholder="Código Timbrado" inputStyle="width:12%" decimalPlaces="0" maxlength="5"  />
               
            </div>
            <br /><br />
            
            <div class="form-group col-md-12">
                <p:outputLabel value="Fecha Desde: " class=" col-lg-1 col-md-1 control-label"/>      
                <div class="col-lg-3 col-md-3">
                    <p:calendar id="cldFecha" value="#{reporteTimbradosControlador.fechaDesde}" pattern="#{formato.formatoFecha}" placeholder="dd/mm/yyyy"/>
                </div>               
            </div>     
            
            <div class="form-group col-md-12">
                <p:outputLabel value="Fecha Hasta: " class=" col-lg-1 col-md-1 control-label"/>      
                <div class="col-lg-3 col-md-3">
                    <p:calendar id="cldFecha2" value="#{reporteTimbradosControlador.fechaHasta}" pattern="#{formato.formatoFecha}" placeholder="dd/mm/yyyy"/>
                </div>               
            </div>     

            <p:commandButton value="Generar Reporte" class="btn-xs btn btn-info" 
                             update=":frmTimbrados" process="@all"
                             actionListener="#{reporteTimbradosControlador.generateReport}" onclick="start()" oncomplete="cancel()" widgetVar="startButton1"  />
            
            <br /><br />
            <p:progressBar id="progressBarClient" widgetVar="pbClient" style=" font-size: small" labelTemplate="Cargando........Por favor espere"  />
            <p:media class="form-group col-lg-12 col-md-12 col-sm-12 col-xs-12" cache="false" rendered="#{reporteTimbradosControlador.media ne null}" width="1400" height="800" value="#{reporteTimbradosControlador.media}" player="pdf"/>
  
        </h:form>
      </p:panel>
    
</html>
