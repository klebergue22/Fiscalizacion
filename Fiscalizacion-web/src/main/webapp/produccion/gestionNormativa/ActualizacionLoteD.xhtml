<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:head>

        <link href="#{facesContext.externalContext.context.contextPath}/css/default.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/font-awesome.min.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/fonts.googleapis.com.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/ace.min.css" rel="stylesheet" type="text/css" />
        <link href="#{facesContext.externalContext.context.contextPath}/css/ace-rtl.min.css" rel="stylesheet" type="text/css" />


        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    </h:head>
    <h:body>
        <!--<link href="#{facesContext.externalContext.context.contextPath}/css/estilos.css" rel="stylesheet" type="text/css" />
        
        -->

        <p:spacer height="10"/>
        <h:form id="frmActualizacionLoteD" enctype="multipart/form-data">
            <p:growl showDetail="true" />
            <div class="container" style="padding-left:1%">
                <div class="panel panel-primary " >
                    <div class="row">
                        <div class="clos-sm-8">
                            <div class="modal-body">     
                                
                                <div class="form-group col-md-12">            
                                    <p:outputLabel value="Dirección:" class=" col-md-1 control-label"/>
                                    <div class="col-md-1">
                                        <p:inputTextarea id="direccion" title="direccion"  placeholder="Ingrese la dirección"/>
                                        <p:fileUpload value="#{solicitudControlador.file}" mode="simple" allowTypes="pdf" />
                                    </div>
                                </div>
                                
                                <div class="form-group col-md-12">            
                                    <p:outputLabel value="Nombres Proyecto: " class=" col-md-1 control-label"/>
                                    <div class="col-md-1">
                                        <p:inputText id="nombres" value="#{solicitudControlador.archivo.nombreArchivo}" title="nombres"  placeholder="Ingrese nombre archivo"/>

                                    </div>
                                </div>
                                
                                <div class="form-group col-lg-12 col-md-12 col-sm-12 col-xs-12">  
                                    <div class="col-md-6">
                                        <p:commandButton value="Grabar Registro" id="idactualizard" class="btn-xs btn btn-info" icon="ui-icon-disk" actionListener="#{solicitudControlador.ingresarSolicitud()}" process="@all" update=":frmActualizacionLoteD" ajax="false" />       
                                    </div>
                                </div> 
                                
                                
                                
                            </div>  
                        </div>  
                    </div>
                </div>
                <p:messages id="msgUsuario" showDetail="true" autoUpdate="true" closable="true" globalOnly="true"/>
            </div>
            
            <div class="container">
                <div class="panel panel-default">
                    <div class="panel-heading" style="font-weight:bold"> Listado de Solicitudes </div>
                    <div class="row">
                        <div class="clos-sm-8">
                            <p:dataTable id="dtSolicitud" value="#{solicitudControlador.listaArchivos}" var="itemSolicitud"
                                                class="panel-heading" paginator="true" paginatorPosition="bottom" rows="15" >
                                
                                <p:column >
                                    <f:facet name="header">
                                        <h:outputText value="Id." />
                                    </f:facet>
                                    <h:outputText value="#{itemSolicitud.idArchivo}" />
                                </p:column>
                                <p:column >
                                    <f:facet name="header">
                                        <h:outputText value="Nombre Archivo" />
                                    </f:facet>
                                    <h:outputText value="#{itemSolicitud.nombreArchivo}" />
                                </p:column>
                                
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </div>

        </h:form>
        <ui:include src="../../sessionTimeOut.xhtml"/>
    </h:body>
</html>
