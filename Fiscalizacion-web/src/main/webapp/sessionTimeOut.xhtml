<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <ui:composition>
        <p:idleMonitor timeout="#{session.maxInactiveInterval * 1000}"
                       onidle="PF('sessionTimeOutDialog').show();">
        </p:idleMonitor>
        <p:dialog header="#{General.tituloSesionCaducada}" widgetVar="sessionTimeOutDialog" 
                  modal="true" closable="false" width="400" visible="false">
            <h:outputText value="#{General.mensajeSesionCaducada}" />
            <input id="confirmBackToLogin" type="button" value="#{General.accederAplicacion}"
                   onclick="window.location = '#{facesContext.externalContext.requestContextPath}/faces/index.xhtml';" />
        </p:dialog>

    </ui:composition>
</html>
